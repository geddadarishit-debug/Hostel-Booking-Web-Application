<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <script src="{{ url_for('static', filename='scripts.js') }}" defer></script>
</head>

<body>
    <button class="theme-switcher" aria-label="Toggle Theme">
        <span class="theme-icon">🌙</span>
    </button>

    <a href="{{ url_for('profile') }}" class="profile-button" aria-label="Profile">
        <img src="{{ url_for('static', filename='uploads/' + current_user.profile_picture) }}" alt="Profile Picture"
            class="profile-img">
    </a>
    <div class="flash-container">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}<button class="close-btn">X</button></div>
        {% endfor %}
        {% endif %}
        {% endwith %}
    </div>
    <div class="container">
        <h2>Change Password</h2>
        <form method="POST" action="{{ url_for('change_password') }}">
            <label for="current_password">Current Password:</label>
            <input type="password" id="current_password" name="current_password" required>
            <label for="new_password">New Password:</label>
            <input type="password" id="new_password" name="new_password" required>
            <label for="confirm_password">Confirm Password:</label>
            <input type="password" id="confirm_password" name="confirm_password" required>
            <button type="submit">Change Password</button>
        </form>

    </div><a href="{{ url_for('dashboard') }}" class="home-button">Home</a>
    <script>document.addEventListener('DOMContentLoaded', () => {
            const themeSwitcher = document.querySelector('.theme-switcher');
            const themeIcon = document.querySelector('.theme-icon');
            const body = document.body;

            // Load the saved theme from localStorage
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme) {
                body.classList.add(savedTheme);
                if (savedTheme === 'light-theme') {
                    themeIcon.textContent = '☀️';
                } else {
                    themeIcon.textContent = '🌙';
                }
            }

            // Toggle theme on button click
            themeSwitcher.addEventListener('click', () => {
                if (body.classList.contains('light-theme')) {
                    body.classList.remove('light-theme');
                    localStorage.setItem('theme', 'dark-theme');
                    themeIcon.textContent = '🌙';
                } else {
                    body.classList.add('light-theme');
                    localStorage.setItem('theme', 'light-theme');
                    themeIcon.textContent = '☀️';
                }
            });
        });</script>
</body>

</html>
