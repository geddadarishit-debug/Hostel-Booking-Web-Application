<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reshma (36)</title>
    <style>
        /* Full-page styling */
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            margin: 0;
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
        }

        /* Header styling */
        h1 {
            margin-bottom: 20px;
            font-size: 28px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Container for hover boxes */
        .container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Hover box styling */
        .hover-box {
            width: 250px;
            height: 60px;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            color: white;
            text-align: center;
            line-height: 60px;
            font-size: 20px;
            font-weight: bold;
            position: relative;
            overflow: hidden;
            border-radius: 15px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.3);
            transition: height 0.4s ease-in-out, box-shadow 0.3s ease-in-out;
            cursor: pointer;
        }

        .hover-box:hover {
            height: 180px;
            /* Expands on hover */
            box-shadow: 0px 6px 15px rgba(0, 0, 0, 0.4);
        }

        /* Hidden content inside hover box */
        .hidden-content {
            opacity: 0;
            transform: translateY(-10px);
            transition: opacity 0.3s ease-in-out, transform 0.3s ease-in-out;
            padding: 10px;
            font-size: 16px;
            color: #333;
        }

        .hover-box:hover .hidden-content {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>

<body>

    <header>
        <h1>About My Project</h1>
    </header>

    <div class="container">
        <div class="hover-box">
            Hover Me
            <div class="hidden-content">
                FLASK
            </div>
        </div>
        <div class="hover-box">
            Hover Me
            <div class="hidden-content">
                MIGRATE
            </div>
        </div>
        <div class="hover-box">
            Hover Me
            <div class="hidden-content">
                OS
            </div>
        </div>
    </div>

</body>

</html>
