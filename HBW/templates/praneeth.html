<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Praneeth (35)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

        body {
            background: #000;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
        }

        .container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            opacity: 0;
            animation: fadeIn 2s forwards;
        }

        h1 {
            font-size: 3rem;
            text-transform: uppercase;
            background: linear-gradient(90deg, #ff00ff, #00ffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: glow 2s infinite alternate;
        }

        p {
            font-size: 1.5rem;
            letter-spacing: 2px;
            opacity: 0;
            animation: slideIn 1.5s ease-in-out forwards 1s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes slideIn {
            from {
                transform: translateY(50px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes glow {
            from {
                text-shadow: 0px 0px 10px #ff00ff;
            }

            to {
                text-shadow: 0px 0px 20px #00ffff;
            }
        }

        .pulse {
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }

            100% {
                transform: scale(1);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1 class="pulse">🔥 Hostel Booking Project 🔥</h1>
        <h2>📚 Project for DTI Subject</h2>
        <h3>👨‍💻 Enhanced by <strong>
                <h3 class="pulse">Praneeth</h3>
        </h3></strong>
        <p>🚀 Backend Developer | 📜 Feature Engineer | 🗄 Database Admin</p>
        <p>⚙ DevOps Engineer | ✅ QA Engineer | 🎯 Product Manager</p>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const container = document.querySelector('.container');
            container.style.opacity = 1;
        });
    </script>
</body>

</html>
