<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Review</title>
    <script src="{{ url_for('static', filename='scripts.js') }}" defer></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">

</head>

<body>
    <button class="theme-switcher" aria-label="Toggle Theme">
        <span class="theme-icon">🌙</span>
    </button>

    <a href="{{ url_for('profile') }}" class="profile-button" aria-label="Profile">
        <img src="{{ url_for('static', filename='uploads/' + current_user.profile_picture) }}" alt="Profile Picture"
            class="profile-img">
    </a>
    <div class="flash-container">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}<button class="close-btn">X</button></div>
        {% endfor %}
        {% endif %}
        {% endwith %}
    </div>
    <div class="edit-review-container">
        <h2>Edit Review</h2>
        <form method="POST">
            <label for="rating">Rating (1-5):</label>
            <select name="rating" required>
                <option value="1" {% if review.rating==1 %}selected{% endif %}>⭐</option>
                <option value="2" {% if review.rating==2 %}selected{% endif %}>⭐⭐</option>
                <option value="3" {% if review.rating==3 %}selected{% endif %}>⭐⭐⭐</option>
                <option value="4" {% if review.rating==4 %}selected{% endif %}>⭐⭐⭐⭐</option>
                <option value="5" {% if review.rating==5 %}selected{% endif %}>⭐⭐⭐⭐⭐</option>
            </select>
            <br>
            <label for="comment">Comment:</label>
            <textarea id="comment" name="comment">{{ review.comment }}</textarea>
            <button type="submit">Update Review</button>
        </form>

    </div><a href="{{ url_for('dashboard') }}" class="home-button">Home</a>
    <script>document.addEventListener('DOMContentLoaded', () => {
            const themeSwitcher = document.querySelector('.theme-switcher');
            const themeIcon = document.querySelector('.theme-icon');
            const body = document.body;

            // Load the saved theme from localStorage
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme) {
                body.classList.add(savedTheme);
                if (savedTheme === 'light-theme') {
                    themeIcon.textContent = '☀️';
                } else {
                    themeIcon.textContent = '🌙';
                }
            }

            // Toggle theme on button click
            themeSwitcher.addEventListener('click', () => {
                if (body.classList.contains('light-theme')) {
                    body.classList.remove('light-theme');
                    localStorage.setItem('theme', 'dark-theme');
                    themeIcon.textContent = '🌙';
                } else {
                    body.classList.add('light-theme');
                    localStorage.setItem('theme', 'light-theme');
                    themeIcon.textContent = '☀️';
                }
            });
        });</script>
</body>

</html>
